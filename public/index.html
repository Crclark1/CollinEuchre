<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collin Euchre</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section id="lobby" class="screen">
      <div class="lobby-card">
        <h1>Collin Euchre</h1>
        <p>Multiplayer Euchre with Bottoms</p>

        <input id="name" placeholder="Your name" />

        <button id="single">Single Player</button>
        <button id="create">Create Multiplayer Room</button>

        <div class="join-row">
          <input id="roomCode" placeholder="Room code" />
          <button id="join">Join</button>
        </div>
      </div>
    </section>

    <section id="game" class="hidden">
      <header class="game-header">
        <div>
          <h1>Collin Euchre</h1>
          <div class="room-line">
            Room: <strong id="room"></strong>
            <button id="copyRoom">Copy Code</button>
          </div>
        </div>

        <div class="scoreboard">
          <div class="score-box">
            <div class="score-name" id="scoreLabel0">Seats 1 & 3</div>
            <div class="score-value" id="score0">0</div>
          </div>
          <div class="score-box">
            <div class="score-name" id="scoreLabel1">Seats 2 & 4</div>
            <div class="score-value" id="score1">0</div>
          </div>
        </div>
      </header>

      <div id="message" class="message"></div>

      <section class="table-wrap">
        <div class="euchre-table">
          <div id="playerTop" class="seat seat-top"></div>
          <div id="playerLeft" class="seat seat-left"></div>
          <div id="playerRight" class="seat seat-right"></div>
          <div id="playerBottom" class="seat seat-bottom"></div>

          <div class="center-area">
            <div class="table-info">
              <div>Dealer: <strong id="dealer"></strong></div>
              <div>Upcard: <strong id="upcard"></strong></div>
              <div>Trump: <strong id="trump"></strong></div>
              <div>Hand Tricks: <strong id="tricks"></strong></div>
            </div>

            <div id="trick" class="trick-area"></div>

            <div id="actions" class="actions"></div>
          </div>
        </div>
      </section>

      <section class="hand-section">
        <h2>Your Hand</h2>
        <div id="hand" class="hand"></div>
      </section>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
